<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#d9a76a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="习惯打卡">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>习惯打卡</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#F7F7F8;--card:#fff;--text:#1D1D1F;--text2:#86868B;--text3:#C7C7CC;--accent:#002FA7;--accentL:#E8EDF5;--border:#D2D2D7;--hairline:#E5E5EA}
  body{font-family:'Helvetica Neue','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;justify-content:center;padding:48px 16px 80px;-webkit-font-smoothing:antialiased}
  .container{width:100%;max-width:420px}

  .hero-illustration{margin-bottom:32px;user-select:none;pointer-events:none}
  .hero-illustration svg{width:100%;height:72px;display:block;margin:0 auto}
  .hero-illustration .sun{fill:var(--accent);opacity:.25}
  .hero-illustration .sun-glow{display:none}
  .hero-illustration .ray{stroke:var(--accent);stroke-width:2;opacity:.3;stroke-linecap:round;fill:none}
  .hero-illustration .mountain-bg{fill:var(--hairline)}
  .hero-illustration .mountain{fill:var(--border)}
  .hero-illustration .dot{fill:var(--accent);opacity:.4}
  .hero-illustration .check-mark{stroke:var(--accent);stroke-width:2.5;opacity:.6;fill:none;stroke-linecap:round;stroke-linejoin:round}

  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--hairline)}
  .date-label{font-size:12px;color:var(--text2);letter-spacing:.5px}
  h1{font-size:20px;font-weight:600;text-align:left;letter-spacing:-.3px;margin:0}
  .progress-ring{flex-shrink:0;position:relative;width:56px;height:56px}
  .progress-ring svg{transform:rotate(-90deg);display:block}
  .progress-ring .bg-circle{fill:none;stroke:var(--hairline);stroke-width:2.5}
  .progress-ring .fg-circle{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset .45s ease}
  .progress-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums}
  .progress-text span{font-size:11px;font-weight:400;color:var(--text3)}

  .weekly-section{margin-bottom:24px}
  .weekly-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .weekly-label{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.4px}
  .weekly-count{font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums}
  .weekly-count strong{color:var(--accent);font-weight:600}
  .weekly-bar-track{height:4px;background:var(--hairline);overflow:hidden;margin-bottom:10px}
  .weekly-bar-fill{height:100%;width:0%;background:var(--accent);transition:width .5s ease}
  .weekly-days{display:flex;justify-content:space-between;gap:3px}
  .weekly-day{flex:1;text-align:center}
  .weekly-day-name{font-size:10px;color:var(--text3);letter-spacing:.3px;margin-bottom:3px}
  .weekly-day-dot{width:100%;height:3px;background:var(--hairline);transition:background .3s ease}
  .weekly-day-dot.full{background:var(--accent)}
  .weekly-day-dot.partial{background:var(--accent);opacity:.4}
  .weekly-day-dot.today{background:var(--text)}

  .habit-list{display:flex;flex-direction:column;gap:0;margin-bottom:20px;border-top:1px solid var(--hairline)}
  .habit-item{display:flex;align-items:center;gap:12px;padding:14px 0;cursor:pointer;transition:opacity .2s;user-select:none;position:relative;border-bottom:1px solid var(--hairline)}
  .habit-item:active{opacity:.6}
  .habit-item.done,.habit-item{background:transparent;border-radius:0;box-shadow:none}
  .habit-item.done .habit-name{text-decoration:none;color:var(--text3)}
  .habit-check{flex-shrink:0;width:20px;height:20px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s ease}
  .habit-item.done .habit-check{background:var(--accent);border-color:var(--accent)}
  .habit-check svg{width:12px;height:12px;opacity:0;transition:opacity .15s ease}
  .habit-item.done .habit-check svg{opacity:1}
  .habit-name{flex:1;font-size:15px;font-weight:400;letter-spacing:-.1px;transition:color .2s}
  .habit-delete{flex-shrink:0;width:24px;height:24px;border:none;background:transparent;cursor:pointer;color:var(--text3);opacity:0;transition:opacity .2s,color .2s;display:flex;align-items:center;justify-content:center}
  .habit-item:hover .habit-delete,.habit-item.show-delete .habit-delete{opacity:1}
  .habit-delete:hover{color:var(--text);background:transparent}

  .add-form{display:flex;border-bottom:1px solid var(--hairline)}
  .add-form input{flex:1;border:none;padding:14px 0;font-size:15px;font-family:inherit;background:transparent;color:var(--text);outline:none}
  .add-form input::placeholder{color:var(--text3)}
  .add-form button{flex-shrink:0;border:none;background:transparent;color:var(--accent);font-size:20px;font-weight:300;cursor:pointer;padding:14px 0 14px 8px;transition:opacity .2s;font-family:inherit}
  .add-form button:active{opacity:.5}
  .add-form button:disabled{opacity:.2;pointer-events:none}

  .quote-section{margin-top:32px;padding:20px 0;text-align:center}
  .quote-text{font-size:13px;line-height:1.7;color:var(--text3);max-width:360px;margin:0 auto 6px}
  .quote-text::before{content:none}
  .quote-author{font-size:11px;color:var(--border);letter-spacing:.3px}

  .empty-state{text-align:center;padding:40px 20px 48px;color:var(--text2)}
  .empty-state svg{width:96px;height:60px;margin-bottom:16px}
  .empty-state p{font-size:14px;line-height:1.6}
  .empty-state .pot-body{fill:var(--border)}
  .empty-state .pot-rim{fill:var(--hairline)}
  .empty-state .leaf,.empty-state .leaf-dark,.empty-state .leaf-green,.empty-state .star{fill:var(--accent)}
  .empty-state .leaf{opacity:.5}
  .empty-state .leaf-dark{opacity:.3}
  .empty-state .leaf-green{opacity:.4}
  .empty-state .star{opacity:.25}

  @keyframes popIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
  .habit-item.pop-in{animation:popIn .35s ease-out}

  .footer{text-align:center;margin-top:20px;font-size:12px;color:var(--text3);letter-spacing:.3px}

  .install-banner{display:none;position:fixed;bottom:16px;left:16px;right:16px;max-width:420px;margin:0 auto;background:var(--card);border:1px solid var(--hairline);padding:14px 16px;align-items:center;gap:12px;z-index:100;animation:popIn .35s ease-out}
  .install-banner.show{display:flex}
  .install-banner img{width:36px;height:36px;flex-shrink:0}
  .install-banner .install-text{flex:1;font-size:13px;line-height:1.4;color:var(--text2)}
  .install-banner .install-text strong{display:block;font-weight:600;color:var(--text)}
  .install-banner .install-close{border:none;background:transparent;color:var(--text3);font-size:16px;cursor:pointer;padding:4px;line-height:1}
  .install-banner .install-btn{border:none;background:var(--accent);color:#fff;padding:7px 14px;font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:.3px}
</style>
</head>

  <header>
    <div class="header-left">

  </div>
</div>

<div class="install-banner" id="installBanner">
  <img src="icon-192.png" alt="">
  <div class="install-text">
    <strong>习惯打卡</strong>
    安装到桌面，随时打卡
  </div>
  <button class="install-btn" id="installBtn">安装</button>
  <button class="install-close" id="installClose">&#10005;</button>
</div>

<script>
  var QUOTES = [
  var WEEKDAY_NAMES = ['一', '二', '三', '四', '五', '六', '日'];
 
  function pad(n) { return n < 10 ? '0' + n : '' + n; }
 
  function dateKey(d) {
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  }
 
  function getMonday(d) {
    d = new Date(d);
    var day = d.getDay();
    var diff = d.getDate() - day + (day === 0 ? -6 : 1);
    d.setDate(diff);
    d.setHours(0,0,0,0);
    return d;
  }
 
  function getWeekDays() {
    var mon = getMonday(new Date());
    var days = [];
    for (var i = 0; i < 7; i++) {
      var d = new Date(mon);
      d.setDate(mon.getDate() + i);
      days.push(d);
    }
    return days;
  }
 
  function calcWeeklyStats() {
    var weekDays = getWeekDays();
    var total = state.habits.length;
    var totalPossible = total * 7;
    var totalDone = 0;
    var daily = [];
    var todayStr = todayKey();
    for (var i = 0; i < weekDays.length; i++) {
      var k = dateKey(weekDays[i]);
      var doneCount = (state.checkins[k] || []).length;
      daily.push({ key: k, count: doneCount, isToday: k === todayStr });
      totalDone += doneCount;
    }
    return { totalDone: totalDone, totalPossible: totalPossible, daily: daily, hasHabits: total > 0 };
  }
 
  function renderWeekly() {
    var stats = calcWeeklyStats();
    var section = document.getElementById('weeklySection');
    var fill = document.getElementById('weeklyBarFill');
    var countEl = document.getElementById('weeklyCount');
    var daysEl = document.getElementById('weeklyDays');
    if (!stats.hasHabits) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    var pct = stats.totalPossible > 0 ? Math.round(stats.totalDone / stats.totalPossible * 100) : 0;
    countEl.innerHTML = '<strong>' + stats.totalDone + '</strong> / ' + stats.totalPossible;
    fill.style.width = pct + '%';
    var html = '';
    for (var i = 0; i < stats.daily.length; i++) {
      var d = stats.daily[i];
      var ratio = state.habits.length > 0 ? d.count / state.habits.length : 0;
      var cls = 'weekly-day-dot';
      if (d.isToday) cls += ' today';
      if (ratio >= 1) cls += ' full';
      else if (ratio > 0) cls += ' partial';
      html += '<div class="weekly-day"><div class="weekly-day-name">' + WEEKDAY_NAMES[i] + '</div><div class="' + cls + '"></div></div>';
    }
    daysEl.innerHTML = html;
  }

    { text: "长风破浪会有时，直挂云帆济沧海。", author: "李白" },
    { text: "不急不躁，绵绵用力，久久为功。", author: "中国谚语" },

  var STORAGE_KEY = 'habit_data';

  var state = { habits: [], checkins: {} };

  function todayKey() {
    var d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function formatDate(dateStr) {
    var d = new Date(dateStr + 'T00:00:00');
    var weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    return (d.getMonth() + 1) + '月' + d.getDate() + '日 星期' + weekdays[d.getDay()];
  }

  function dailyQuoteIndex() {
    var d = new Date();
    var seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
    return seed % QUOTES.length;
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        state.habits = parsed.habits || [];
        state.checkins = parsed.checkins || {};
      }
    } catch(e) {}
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function getTodayCheckins() {
    return state.checkins[todayKey()] || [];
  }

  function isDone(habitId) {
    return getTodayCheckins().indexOf(habitId) !== -1;
  }

  function toggleHabit(habitId) {
    var key = todayKey();
    var ids = state.checkins[key] || [];
    var idx = ids.indexOf(habitId);
    if (idx !== -1) {
      ids = ids.slice(0, idx).concat(ids.slice(idx + 1));
    } else {
      ids = ids.concat([habitId]);
    }
    if (ids.length === 0) {
      delete state.checkins[key];
    } else {
      state.checkins[key] = ids;
    }
    saveState();
    render();
  }

  function deleteHabit(habitId) {
    state.habits = state.habits.filter(function(h) { return h.id !== habitId; });
    for (var key in state.checkins) {
      if (state.checkins.hasOwnProperty(key)) {
        state.checkins[key] = state.checkins[key].filter(function(id) { return id !== habitId; });
        if (state.checkins[key].length === 0) delete state.checkins[key];
      }
    }
    saveState();
    render();
  }

  function addHabit(name) {
    var trimmed = name.trim();
    if (!trimmed) return;
    for (var i = 0; i < state.habits.length; i++) {
      if (state.habits[i].name === trimmed) return;
    }
    state.habits.push({ id: Date.now(), name: trimmed });
    saveState();
    render();
    document.getElementById('habitInput').value = '';
    document.getElementById('addBtn').disabled = true;
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function render() {
    var list = document.getElementById('habitList');
    var today = getTodayCheckins();
    var total = state.habits.length;
    var done = today.length;

    document.getElementById('dateLabel').textContent = formatDate(todayKey());

    var circumference = 2 * Math.PI * 34;
    var offset = total === 0 ? circumference : circumference * (1 - done / total);
    var circle = document.getElementById('progressCircle');
    circle.style.strokeDashoffset = offset;
    document.getElementById('progressText').innerHTML = done + '<span>/' + total + '</span>';

    var qi = dailyQuoteIndex();
    document.getElementById('quoteText').textContent = QUOTES[qi].text;
    document.getElementById('quoteAuthor').textContent = '—— ' + QUOTES[qi].author;

    renderWeekly();
 
    if (total === 0) {
      list.innerHTML =
        '<div class="empty-state">' +
          '<svg viewBox="0 0 130 80" fill="none" xmlns="http://www.w3.org/2000/svg">' +
            '<ellipse class="pot-body" cx="65" cy="72" rx="18" ry="6" />' +
            '<rect class="pot-rim" x="47" y="66" width="36" height="6" rx="2" />' +
            '<path class="leaf" d="M65 66 L50 40 Q55 30 65 40" />' +
            '<path class="leaf-green" d="M65 66 L80 36 Q75 26 65 40" />' +
            '<path class="leaf-dark" d="M65 66 L60 28 Q63 20 65 28" />' +
            '<path class="leaf" d="M65 66 L72 24 Q68 18 65 28" />' +
            '<circle class="star" cx="42" cy="30" r="3" />' +
            '<circle class="star" cx="90" cy="22" r="2.5" />' +
            '<circle class="star" cx="100" cy="44" r="2" />' +
          '</svg>' +
          '<p>还没有习惯<br>在下方添加一个吧</p>' +
        '</div>';
      return;
    }

    var html = '';
    for (var i = 0; i < state.habits.length; i++) {
      var h = state.habits[i];
      var checked = isDone(h.id);
      html += '<div class="habit-item' + (checked ? ' done' : '') + '" data-id="' + h.id + '">' +
        '<div class="habit-check">' +
          '<svg viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
            '<polyline points="3 8.5 6.5 12 13 4" />' +
          '</svg>' +
        '</div>' +
        '<span class="habit-name">' + escapeHtml(h.name) + '</span>' +
        '<button class="habit-delete" aria-label="删除" data-action="delete">&#10005;</button>' +
      '</div>';
    }
    list.innerHTML = html;

    var items = list.querySelectorAll('.habit-item');
    for (var i = 0; i < items.length; i++) {
      (function(el) {
        var id = Number(el.dataset.id);

        el.addEventListener('click', function(e) {
          if (e.target.closest('[data-action="delete"]')) return;
          toggleHabit(id);
        });

        var timer = null;

        function start() {
          timer = setTimeout(function() {
            el.classList.toggle('show-delete');
          }, 400);
        }

        function end() {
          if (timer) { clearTimeout(timer); timer = null; }
        }

        el.addEventListener('mousedown', start);
        el.addEventListener('mouseup', end);
        el.addEventListener('mouseleave', end);
        el.addEventListener('touchstart', start, { passive: true });
        el.addEventListener('touchend', end);
        el.addEventListener('touchcancel', end);

        el.querySelector('[data-action="delete"]').addEventListener('click', function(e) {
          e.stopPropagation();
          deleteHabit(id);
        });
      })(items[i]);
    }
  }

  loadState();
  render();
  document.addEventListener('visibilitychange', saveState);

  var input = document.getElementById('habitInput');
  var addBtn = document.getElementById('addBtn');

  input.addEventListener('input', function() {
    addBtn.disabled = input.value.trim().length === 0;
  });

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !addBtn.disabled) {
      addHabit(input.value);
    }
  });

  addBtn.addEventListener('click', function() { addHabit(input.value); });

  if (window.matchMedia('(pointer: fine)').matches) {
    input.focus();
  }

  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // ── PWA Install Prompt ──
  var deferredPrompt = null;
  var installBanner = document.getElementById('installBanner');
  var installBtn = document.getElementById('installBtn');
  var installClose = document.getElementById('installClose');

  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    installBanner.classList.add('show');
  });

  installBtn.addEventListener('click', function() {
    installBanner.classList.remove('show');
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function() {
        deferredPrompt = null;
      });
    }
  });

  installClose.addEventListener('click', function() {
    installBanner.classList.remove('show');
    deferredPrompt = null;
  });
</script>
</body>
</html>
